cit:
  mode: port
  port: 6379

build:
  variants:
    - tag: "pkg-latest"
      pkg_name: redis
      containerfile: Containerfile.pkg
      args:
        PACKAGES: "redis"
        BASE_VERSION: "15.1-latest"
      aliases: ["latest", "pkg", "8.8"]
      default: true
    - tag: "6.2-pkg-latest"
      pkg_name: redis62
      containerfile: Containerfile.pkg
      args:
        PACKAGES: "redis62"
        BASE_VERSION: "15.1-latest"
      aliases: ["6.2"]
    - tag: "7.2-pkg-latest"
      pkg_name: redis72
      containerfile: Containerfile.pkg
      args:
        PACKAGES: "redis72"
        BASE_VERSION: "15.1-latest"
      aliases: ["7.2"]
    - tag: "7.4-pkg-latest"
      pkg_name: redis74
      containerfile: Containerfile.pkg
      args:
        PACKAGES: "redis74"
        BASE_VERSION: "15.1-latest"
