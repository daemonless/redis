    - tag: "8.0-pkg-latest"
      pkg_name: redis80
      containerfile: Containerfile.pkg
      args:
        PACKAGES: "redis80"
        BASE_VERSION: "15.1-latest"
      aliases: ["8.0"]
    - tag: "8.2-pkg-latest"
      pkg_name: redis82
      containerfile: Containerfile.pkg
